<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Planos de Saúde</title>
    <style>
        :root { --primary: #0e5a37; --secondary: #3af2a4; --dark: #0e1a23; --accent: #ff872a; }
        body { font-family: 'Inter', sans-serif; background: #0a4a2e; color: #fff; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 480px; width: 100%; background: white; color: var(--dark); padding: 30px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        h2 { color: var(--primary); text-align: center; margin-top: 0; font-size: 22px; }
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; color: #555; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; outline: none; transition: 0.3s; box-sizing: border-box; }
        select:focus, input:focus { border-color: var(--primary); }

        /* Box de Info da Operadora (Baseado na referência) */
        #info-box { margin-top: 20px; padding: 15px; background: #f0fdf4; border-left: 5px solid var(--primary); border-radius: 8px; display: none; }
        #info-box h4 { margin: 0; color: var(--primary); text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        #info-box p { margin: 5px 0 0; font-size: 14px; line-height: 1.4; color: #444; }

        .grid-idades { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .field-idade { background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .field-idade label { margin: 0; font-size: 11px; color: #777; }
        .field-idade input { padding: 8px; margin-top: 4px; border-width: 1px; }
        
        .btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; margin-top: 25px; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: var(--dark); transform: translateY(-2px); }
        .btn-back { background: none; color: #888; text-decoration: underline; font-size: 13px; margin-top: 15px; border: none; cursor: pointer; width: 100%; }

        .total-banner { background: var(--dark); color: var(--secondary); padding: 25px; border-radius: 12px; text-align: center; margin-top: 20px; }
        .total-banner small { color: #fff; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
        .total-banner strong { font-size: 32px; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="step1" class="step active">
        <h2>Simulador de Saúde</h2>
        <label>Qual operadora deseja cotar?</label>
        <select id="select-operadora" onchange="atualizarDetalhes()">
            <option value="">Carregando opções...</option>
        </select>

        <div id="info-box">
            <h4 id="info-titulo"></h4>
            <p id="info-texto"></p>
        </div>

        <button class="btn" onclick="validarStep1()">Próximo: Adicionar Pessoas</button>
    </div>

    <div id="step2" class="step">
        <h2>Quem fará o plano?</h2>
        <p style="font-size: 13px; color: #666; text-align: center;">Informe a quantidade de pessoas por faixa:</p>
        <div id="idades-inputs" class="grid-idades"></div>
        
        <button class="btn" onclick="calcularTotal()">Ver Preço Estimado</button>
        <button class="btn-back" onclick="changeStep(1)">Voltar para Operadoras</button>
    </div>

    <div id="step3" class="step">
        <h2>Cotação Pronta!</h2>
        <div class="total-banner">
            <small>Valor Mensal Estimado</small>
            <strong id="res-total">R$ 0,00</strong>
        </div>
        
        <div style="margin-top:25px;">
            <label>Seu Nome:</label>
            <input type="text" id="nome" placeholder="Nome completo">
            <label>WhatsApp:</label>
            <input type="tel" id="whatsapp" placeholder="(00) 00000-0000">
            <button class="btn" style="background: var(--accent);" onclick="enviarLead()">Solicitar Tabela por WhatsApp</button>
        </div>
        <button class="btn-back" onclick="changeStep(2)">Ajustar idades</button>
    </div>
</div>

<script>
    // Dicionário de Informações (Referência Visual)
    const INFO_OP = {
        "hapvida": { t: "Hapvida", d: "Plano com melhor custo-benefício, ideal para famílias e empresas." },
        "bradesco": { t: "Bradesco Saúde", d: "Rede Premium nacional, reembolso e atendimento nos melhores hospitais." },
        "sulamerica": { t: "SulAmérica", d: "Excelente rede credenciada e diversos benefícios adicionais." },
        "medsenior": { t: "MedSenior", d: "Especialista em terceira idade (49+) com foco em prevenção." },
        "unimed": { t: "Unimed", d: "A maior rede médica do Brasil com atendimento em todas as regiões." },
        "assim": { t: "Assim Saúde", d: "Referência no Rio de Janeiro com ampla rede própria e conveniência." }
    };

    let dadosTabelas = {};
    const faixas = ["0-18", "19-23", "24-28", "29-33", "34-38", "39-43", "44-48", "49-53", "54-58", "59+"];

    // Carregar JSON
    fetch('tabela_precos_saude.json')
        .then(res => res.json())
        .then(json => {
            dadosTabelas = json.tabelas;
            popularSelect();
            gerarCamposIdade();
        });

    function popularSelect() {
        const select = document.getElementById('select-operadora');
        select.innerHTML = '<option value="">Selecione uma operadora...</option>';
        Object.keys(dadosTabelas).forEach(op => {
            const label = INFO_OP[op] ? INFO_OP[op].t : op.toUpperCase();
            select.add(new Option(label, op));
        });
    }

    function atualizarDetalhes() {
        const op = document.getElementById('select-operadora').value;
        const box = document.getElementById('info-box');
        if (op && INFO_OP[op]) {
            document.getElementById('info-titulo').innerText = INFO_OP[op].t;
            document.getElementById('info-texto').innerText = INFO_OP[op].d;
            box.style.display = 'block';
        } else {
            box.style.display = 'none';
        }
    }

    function gerarCamposIdade() {
        const container = document.getElementById('idades-inputs');
        faixas.forEach(f => {
            container.innerHTML += `
                <div class="field-idade">
                    <label>${f} anos</label>
                    <input type="number" class="qtd-idade" data-faixa="${f}" value="0" min="0">
                </div>`;
        });
    }

    function changeStep(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
    }

    function validarStep1() {
        if (!document.getElementById('select-operadora').value) return alert("Selecione uma operadora.");
        changeStep(2);
    }

    function calcularTotal() {
        const op = document.getElementById('select-operadora').value;
        const inputs = document.querySelectorAll('.qtd-idade');
        let total = 0;

        inputs.forEach(input => {
            const qtd = parseInt(input.value) || 0;
            const faixa = input.getAttribute('data-faixa');
            if (qtd > 0) {
                // Como removemos o select, usamos "E" (Enfermaria) como padrão de entrada
                const preco = (dadosTabelas[op]["E"] && dadosTabelas[op]["E"][faixa]) ? dadosTabelas[op]["E"][faixa] : 0;
                total += (qtd * preco);
            }
        });

        if (total === 0) return alert("Informe ao menos uma pessoa.");

        document.getElementById('res-total').innerText = total.toLocaleString('pt-br', {style: 'currency', currency: 'BRL'});
        changeStep(3);
    }

    function enviarLead() {
        const nome = document.getElementById('nome').value;
        const whats = document.getElementById('whatsapp').value;
        const total = document.getElementById('res-total').innerText;
        const op = document.getElementById('select-operadora').value.toUpperCase();

        if (!nome || !whats) return alert("Preencha os campos para continuar.");

        const msg = `Olá! Acabei de fazer uma simulação para o plano ${op}.\nNome: ${nome}\nValor Estimado: ${total}\nTenho interesse na tabela completa.`;
        window.open(`https://wa.me/5522997389593?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>

</body>
</html>
